[mypy]
python_version = 3.12
files = merlin_api_server.py, merlin_uaf_integration.py, merlin_uaf_endpoints.py, merlin_intelligence_integration.py, merlin_ipc_consumer.py, merlin_adaptive_llm.py, merlin_parallel_llm.py, merlin_llm_backends.py, merlin_metrics_dashboard.py, merlin_predictive_selection.py, merlin_cost_optimization.py, merlin_ab_testing.py, merlin_settings.py, merlin_rag.py, merlin_vector_memory.py, merlin_resource_api.py, merlin_resource_indexer.py, merlin_command_executor.py, merlin_file_manager.py, merlin_system_info.py
ignore_missing_imports = True
follow_imports = silent
implicit_optional = True
show_error_codes = True
warn_unused_ignores = True
warn_unused_configs = True
no_implicit_reexport = True

# S092 phased strictness rollout by criticality.
# Phase 1 (critical runtime): tighten LLM backend typing aggressively.
[mypy-merlin_llm_backends]
implicit_optional = False
disallow_incomplete_defs = True
check_untyped_defs = True

# Phase 2 (critical API surface): disable implicit Optional coercion first.
[mypy-merlin_api_server]
implicit_optional = False
