name: Merlin CI

on:
  push:
    branches: [main, master]
    tags: ["v*", "release-*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  changelog:
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate changelog from tags
        run: |
          python merlin_changelog.py --output artifacts/changelog/changelog-from-tags.md

      - name: Upload changelog artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: changelog-from-tags
          path: artifacts/changelog/changelog-from-tags.md

  dependency_audit:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt pip-audit

      - name: Run dependency vulnerability scan
        id: pip_audit
        continue-on-error: true
        run: |
          mkdir -p artifacts/security
          python -m pip_audit -r requirements.txt -f json -o artifacts/security/pip-audit-report.json

      - name: Generate dependency audit markdown report
        if: always()
        run: |
          python scripts/generate_dependency_audit_report.py \
            --audit-json artifacts/security/pip-audit-report.json \
            --output artifacts/security/dependency-audit-report.md

      - name: Upload dependency audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-audit-report
          path: |
            artifacts/security/pip-audit-report.json
            artifacts/security/dependency-audit-report.md

      - name: Enforce dependency vulnerability gate
        if: always()
        run: |
          if [ "${{ steps.pip_audit.outcome }}" != "success" ]; then
            echo "Dependency audit failed: vulnerabilities or execution error detected."
            exit 1
          fi

  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        with:
          upload-artifact: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Frontend bundle budget gate
        run: npm --prefix frontend run build

      - name: Upload frontend bundle budget report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-bundle-budget-report
          path: artifacts/frontend/frontend-dist-size-report.json

      - name: Packaged plugin strict load guard
        run: |
          MERLIN_PLUGIN_STRICT_PACKAGED=true python merlin_cli.py plugin list > /tmp/merlin_plugins.json
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("/tmp/merlin_plugins.json").read_text(encoding="utf-8"))
          for name in ("kernel", "file_manager", "discovery_engine", "session_builder", "session_streamer"):
              if name not in payload:
                  raise SystemExit(f"missing expected plugin: {name}")
          print("strict plugin load guard passed")
          PY

      - name: Wheel install smoke test (packaged plugins)
        run: |
          python -m pip install --upgrade build
          rm -rf dist
          python -m build --wheel --outdir dist

          python -m venv --system-site-packages /tmp/merlin-wheel-smoke
          /tmp/merlin-wheel-smoke/bin/python -m pip install --upgrade pip
          /tmp/merlin-wheel-smoke/bin/python -m pip install dist/*.whl

          wheel_smoke_dir="$(mktemp -d)"
          (
            cd "$wheel_smoke_dir"
            MERLIN_PLUGIN_STRICT_PACKAGED=true \
              /tmp/merlin-wheel-smoke/bin/python -m merlin_cli plugin list > plugins.json 2> plugins.stderr
          )

          if grep -q "No module named 'core'" "$wheel_smoke_dir/plugins.stderr"; then
            echo "Wheel smoke test failed: core import missing in installed runtime."
            cat "$wheel_smoke_dir/plugins.stderr"
            exit 1
          fi
          if grep -q "No module named 'core.integrations'" "$wheel_smoke_dir/plugins.stderr"; then
            echo "Wheel smoke test failed: core.integrations import missing in installed runtime."
            cat "$wheel_smoke_dir/plugins.stderr"
            exit 1
          fi

          python - "$wheel_smoke_dir/plugins.json" <<'PY'
          import json
          import sys
          from pathlib import Path

          payload = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))
          required = ("kernel", "file_manager", "discovery_engine", "session_builder", "session_streamer")
          missing = [name for name in required if name not in payload]
          if missing:
            raise SystemExit(f"wheel smoke test missing plugins: {', '.join(missing)}")
          print(f"wheel smoke test passed with {len(payload)} plugins")
          PY

      - name: Critical module coverage gate
        run: |
          python -m pytest -q \
            tests/test_merlin_api_server.py \
            tests/test_merlin_discovery_engine.py \
            tests/test_merlin_plugin_manager.py \
            --cov=merlin_api_server \
            --cov=merlin_discovery_engine \
            --cov=merlin_plugin_manager \
            --cov-report=term-missing:skip-covered \
            --cov-fail-under=55

      - name: Formatting check
        run: |
          python -m black --check \
            merlin_api_server.py \
            merlin_discovery_engine.py \
            merlin_plugin_manager.py \
            merlin_settings.py \
            scripts/check_git_size.py \
            setup.py

  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest
