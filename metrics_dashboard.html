<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merlin LLM Metrics Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }
        
        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5em;
            color: #00d4ff;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 212, 255, 0.3);
        }
        
        .header p {
            color: #8892b0;
            font-size: 1.1em;
        }
        
        .status-bar {
            display: flex;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid rgba(0, 212, 255, 0.2);
        }
        
        .status-item {
            flex: 1;
            text-align: center;
        }
        
        .status-item .label {
            color: #8892b0;
            font-size: 0.9em;
            margin-bottom: 5px;
        }
        
        .status-item .value {
            font-size: 1.5em;
            font-weight: bold;
        }
        
        .status-item .value.online {
            color: #00ff88;
        }
        
        .status-item .value.offline {
            color: #ff6b6b;
        }
        
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s ease;
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.1);
        }
        
        .card h2 {
            color: #00d4ff;
            margin-bottom: 15px;
            font-size: 1.4em;
            border-bottom: 2px solid rgba(0, 212, 255, 0.2);
            padding-bottom: 10px;
        }
        
        .model-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
        }
        
        .model-card {
            background: rgba(0, 212, 255, 0.1);
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #00d4ff;
        }
        
        .model-card .model-name {
            font-size: 1.3em;
            font-weight: bold;
            color: #00d4ff;
            margin-bottom: 10px;
        }
        
        .model-card .metrics {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        
        .metric {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 5px;
        }
        
        .metric .metric-label {
            color: #8892b0;
            font-size: 0.9em;
        }
        
        .metric .metric-value {
            font-size: 1.1em;
            font-weight: bold;
        }
        
        .metric .metric-value.good {
            color: #00ff88;
        }
        
        .metric .metric-value.warning {
            color: #ffbd44;
        }
        
        .metric .metric-value.danger {
            color: #ff6b6b;
        }
        
        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin-top: 5px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff, #00ff88);
            transition: width 0.5s ease;
        }
        
        .summary-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        
        .summary-item {
            text-align: center;
            padding: 15px;
            background: rgba(0, 212, 255, 0.05);
            border-radius: 8px;
        }
        
        .summary-item .summary-label {
            color: #8892b0;
            font-size: 0.9em;
            margin-bottom: 5px;
        }
        
        .summary-item .summary-value {
            font-size: 1.8em;
            font-weight: bold;
            color: #00d4ff;
        }
        
        .connection-status {
            position: fixed;
            top: 10px;
            right: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 15px;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 20px;
            z-index: 1000;
        }
        
        .connection-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ff6b6b;
        }
        
        .connection-indicator.connected {
            background: #00ff88;
            box-shadow: 0 0 10px #00ff88;
        }
        
        .connection-text {
            color: white;
            font-size: 0.9em;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .updating {
            animation: pulse 1.5s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="header">
            <h1>Merlin LLM Metrics Dashboard</h1>
            <p>Real-time Model Performance & Learning Analytics</p>
        </div>
        
        <div class="connection-status">
            <div class="connection-indicator" id="connectionIndicator"></div>
            <span class="connection-text" id="connectionText">Disconnected</span>
        </div>
        
        <div class="status-bar">
            <div class="status-item">
                <div class="label">Strategy</div>
                <div class="value" id="strategy">Loading...</div>
            </div>
            <div class="status-item">
                <div class="label">Learning Mode</div>
                <div class="value" id="learningMode">Loading...</div>
            </div>
            <div class="status-item">
                <div class="label">Active Models</div>
                <div class="value" id="activeModels">Loading...</div>
            </div>
        </div>
        
        <div class="dashboard-grid">
            <div class="card">
                <h2>Model Performance</h2>
                <div class="model-grid" id="modelGrid">
                    <div class="model-card">
                        <div class="model-name">Loading...</div>
                    </div>
                </div>
            </div>
            
            <div class="card">
                <h2>Summary Statistics</h2>
                <div class="summary-stats">
                    <div class="summary-item">
                        <div class="summary-label">Total Requests</div>
                        <div class="summary-value" id="totalRequests">0</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-label">Overall Success Rate</div>
                        <div class="summary-value" id="overallSuccess">0%</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-label">Average Latency</div>
                        <div class="summary-value" id="avgLatency">0s</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-label">Best Model</div>
                        <div class="summary-value" id="bestModel">-</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let ws = null;
        let reconnectAttempts = 0;
        const maxReconnectAttempts = 5;
        
        function connect() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws/dashboard`;
            
            ws = new WebSocket(wsUrl);
            
            ws.onopen = function() {
                console.log('WebSocket connected');
                document.getElementById('connectionIndicator').classList.add('connected');
                document.getElementById('connectionText').textContent = 'Connected';
                reconnectAttempts = 0;
            };
            
            ws.onmessage = function(event) {
                try {
                    const data = JSON.parse(event.data);
                    updateDashboard(data);
                } catch (e) {
                    console.error('Failed to parse message:', e);
                }
            };
            
            ws.onerror = function(error) {
                console.error('WebSocket error:', error);
            };
            
            ws.onclose = function() {
                console.log('WebSocket disconnected');
                document.getElementById('connectionIndicator').classList.remove('connected');
                document.getElementById('connectionText').textContent = 'Disconnected';
                
                if (reconnectAttempts < maxReconnectAttempts) {
                    reconnectAttempts++;
                    setTimeout(connect, 3000 * reconnectAttempts);
                }
            };
        }
        
        function updateDashboard(data) {
            if (data.type === 'status') {
                document.getElementById('strategy').textContent = data.strategy.toUpperCase();
                document.getElementById('learningMode').textContent = data.learning_mode ? 'ENABLED' : 'DISABLED';
                document.getElementById('activeModels').textContent = data.summary.model_count;
                
                document.getElementById('totalRequests').textContent = data.summary.total_requests.toLocaleString();
                document.getElementById('overallSuccess').textContent = (data.summary.overall_success_rate * 100).toFixed(1) + '%';
                document.getElementById('avgLatency').textContent = data.summary.overall_avg_latency.toFixed(2) + 's';
                document.getElementById('bestModel').textContent = data.summary.best_model || '-';
                
                updateModelCards(data.models);
            }
        }
        
        function updateModelCards(models) {
            const grid = document.getElementById('modelGrid');
            grid.innerHTML = '';
            
            for (const [modelName, modelData] of Object.entries(models)) {
                const card = createModelCard(modelName, modelData);
                grid.appendChild(card);
            }
        }
        
        function createModelCard(name, data) {
            const card = document.createElement('div');
            card.className = 'model-card';
            
            const nameEl = document.createElement('div');
            nameEl.className = 'model-name';
            nameEl.textContent = name;
            card.appendChild(nameEl);
            
            const metricsEl = document.createElement('div');
            metricsEl.className = 'metrics';
            
            const totalReqs = createMetric('Total Requests', data.total_requests.toLocaleString());
            const successRate = createMetric('Success Rate', `${(data.success_rate * 100).toFixed(1)}%`, data.success_rate);
            const avgLatency = createMetric('Avg Latency', `${data.avg_latency.toFixed(2)}s`, data.avg_latency < 2);
            const avgRating = createMetric('Avg Rating', `${data.avg_rating.toFixed(1)}/5`, data.avg_rating >= 4);
            
            metricsEl.appendChild(totalReqs);
            metricsEl.appendChild(successRate);
            metricsEl.appendChild(avgLatency);
            metricsEl.appendChild(avgRating);
            
            card.appendChild(metricsEl);
            
            return card;
        }
        
        function createMetric(label, value, isGood = null) {
            const metricEl = document.createElement('div');
            metricEl.className = 'metric';
            
            const labelEl = document.createElement('span');
            labelEl.className = 'metric-label';
            labelEl.textContent = label;
            
            const valueEl = document.createElement('span');
            valueEl.className = 'metric-value';
            valueEl.textContent = value;
            
            if (isGood !== null) {
                valueEl.classList.add(isGood ? 'good' : 'danger');
            } else if (typeof isGood === 'number' && isGood < 0.8) {
                valueEl.classList.add('warning');
            }
            
            metricEl.appendChild(labelEl);
            metricEl.appendChild(valueEl);
            
            return metricEl;
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            connect();
        });
    </script>
</body>
</html>
