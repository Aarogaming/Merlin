[pytest]
testpaths = tests
pythonpath = .
addopts = -ra --capture=sys
markers =
    critical_coverage: tests included in critical module coverage gate (API/routing/research manager)
filterwarnings =
    ignore:.*asyncio\.iscoroutinefunction.*:DeprecationWarning
    ignore:.*The 'app' shortcut is now deprecated.*:DeprecationWarning
