version: '3.8'

services:
  merlin-backend:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - .:/app
      - logs:/app/logs
      - merlin_chat_history:/app/merlin_chat_history

  redis:
    image: "redis:alpine"
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  logs:
  merlin_chat_history:
  redis_data:
